MODEL:
  WEIGHT: "catalog://ImageNetPretrained/DLA34"
  SMOKE_HEAD:
    MODE: "baseline"
    REGRESSION_HEADS: 8
    REGRESSION_CHANNEL: (1, 2, 3, 2)
    DIMENSION_REFERENCE: ((9.8, 3.3, 2.5),)
    DEPTH_REFERENCE: (6.15, 2.48)
INPUT:
  FLIP_PROB_TRAIN: 0.5
  SHIFT_SCALE_PROB_TRAIN: 0.3
DATASETS:
  DETECT_CLASSES: ("Car",)
  TRAIN: ("kitti_train",)
  TEST: ("kitti_test",)
  TRAIN_SPLIT: "train"
  TEST_SPLIT: "val"
SOLVER:
  BASE_LR: 2.5e-4
  STEPS: (6250, 10000)
  MAX_ITERATION: 15000
  CHECKPOINT_PERIOD: 1000
  IMS_PER_BATCH: 16
